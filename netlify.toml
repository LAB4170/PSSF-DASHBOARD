[build]
  # Tell Netlify that the frontend code is in the 'frontend' directory
  base = "frontend"
  
  # The build command to run inside the frontend directory
  command = "npm install && npm run build"
  
  # The directory where the built assets are output (relative to the base directory)
  publish = "dist/client"

[[redirects]]
  # Redirect all unknown requests to index.html to allow TanStack Router to handle routing
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://pssf-operations-centre.onrender.com"
