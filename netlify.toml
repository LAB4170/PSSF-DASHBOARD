[build]
  # Run from root — cd into frontend, install, and build
  command = "cd frontend && npm install && npm run build"
  
  # Vite outputs to frontend/dist (plain SPA build)
  publish = "frontend/dist"

[[redirects]]
  # SPA fallback: all routes go to index.html so TanStack Router handles them
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://pssf-operations-centre.onrender.com"
